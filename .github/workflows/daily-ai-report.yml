name: Daily AI Industry Report

on:
  schedule:
    # 每天 10:15 运行 (UTC+8 时间需要转换，10:15 UTC+8 = 02:15 UTC)
    - cron: '15 2 * * *'
  
  # 允许手动触发
  workflow_dispatch:

jobs:
  generate-daily-report:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install requests beautifulsoup4 markdown
    
    - name: Generate daily report
      run: |
        python .github/scripts/generate_daily_report.py
    
    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add daily/
        git diff --staged --quiet || (git commit -m "Daily AI industry report - $(date +%Y%m%d)" && git push)
